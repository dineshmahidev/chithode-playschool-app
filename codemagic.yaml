workflows:
  expo-android-apk:
    name: Expo Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      groups:
        - expo_credentials # You can define this in Codemagic UI if needed
    working_directory: my-expo-app
    scripts:
      - name: Install dependencies
        script: |
          npm install -g expo-cli
          npm install
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android
      - name: Build Android Debug APK
        script: |
          cd android
          ./gradlew assembleDebug
      - name: Build Android Release APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - my-expo-app/android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - dineshwebdev2003@gmail.com
